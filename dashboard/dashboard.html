<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard</title>

    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />

    <link rel="stylesheet" href="dashboard.css" />
    <link rel="stylesheet" href="../style.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/luxon@3/build/global/luxon.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-luxon"></script>
    <script src="../index.js" defer></script>
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">WildFire Protection</div>
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="dashboard.html">Dashboard</a></li>
        <li><a href="../conclusion/conclusion.html">Conclusion</a></li>
        <li>
          <button class="btn-primary">
            <a href="../simulator/simulator.html">Try Simulator</a>
          </button>
        </li>
      </ul>
      <div class="hamburger">
        <span class="line"></span>
        <span class="line"></span>
        <span class="line"></span>
      </div>
    </nav>
    <div class="nav-menu">
      <ul>
        <li><a href="../index.html">Home</a></li>
        <li><a href="./dashboard.html">Dashboard</a></li>
        <li><a href="../conclusion/conclusion.html">Conclusion</a></li>
        <li>
          <button class="btn-primary">
            <a href="../simulator/simulator.html">Try Simulator</a>
          </button>
        </li>
      </ul>
    </div>
    <div class="container">
      <h2>Dashboard</h2>

      <p class="mb-60">
        <span
          data-text="This dashboard can only be accessed if the site has a internet connection and is run using a local server. If you are opening the HTML file directly, it does not allow the dashboard to function properly. Please run a local server (e.g., using Python's http.server) and access the dashboard through the server URL (e.g., http://localhost:8000/dashboard/dashboard.html) to view the live data and charts."
        ></span>
      </p>
      <div
        style="flex-wrap: wrap; gap: 30px; justify-content: space-evenly"
        class="flex"
      >
        <div class="card">
          <h3>Temperature:</h3>
          <div id="temperatureCard">
            <canvas id="temperature"></canvas>
          </div>
        </div>

        <div class="card">
          <h3>Humidity:</h3>
          <div id="humidityCard">
            <canvas id="humidity"></canvas>
          </div>
        </div>

        <div class="card">
          <h3>Probability:</h3>
          <div id="probabilityCard">
            <canvas id="risk"></canvas>
            <div id="probability">
              <p>--</p>
              <p></p>
            </div>
          </div>
        </div>

        <div id="sensorStatus" class="card">
          <div class="left">
            <h3>Latest Readings:</h3>
            <div class="info">
              <span class="material-symbols-outlined"> device_thermostat </span>
              <h4>Temperature:</h4>
              <span id="Ltemperature">--</span>
            </div>
            <div class="info">
              <span class="material-symbols-outlined"> humidity_mid </span>
              <h4>Humidity:</h4>
              <span id="Lhumidity">--</span>
            </div>
            <div class="info">
              <div id="datetime">--</div>
            </div>
          </div>
          <div class="right">
            <span class="material-symbols-outlined"> sensors </span>
          </div>
        </div>
      </div>
    </div>

    <script src="data.js"></script>
  </body>
</html>
